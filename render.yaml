services:
  - type: web
    name: smart-pickup-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npx --yes pnpm@9 install --no-frozen-lockfile && cd apps/api && npx tsc -p tsconfig.json --noEmitOnError false
    startCommand: node apps/api/dist/main
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: NODE_VERSION
        value: "20.19.1"
