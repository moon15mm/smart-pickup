version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartpickup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-smartpickup}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U smartpickup']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sp_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redissecret}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: sp_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-smartpickup}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-smartpickup}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redissecret}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-changeme-jwt-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-changeme-refresh-secret}
    ports:
      - '3001:3001'
    volumes:
      - ./apps/api:/app
      - /app/node_modules

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: sp_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
    ports:
      - '3000:3000'

  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
    container_name: sp_dashboard
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
    ports:
      - '3002:3002'

volumes:
  postgres_data:
  redis_data:
